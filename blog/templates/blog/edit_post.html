{% extends 'page/base.html' %}

{% block title %}Chỉnh sửa bài viết{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
            
            <div class="text-center mb-5 border-bottom pb-4">
                <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 mb-3 fw-bold">
                    Cập nhật
                </span>
                <h2 class="fw-bold text-dark mb-2">Chỉnh Sửa Bài Viết</h2>
                <p class="text-muted">Làm mới lại những ý tưởng tuyệt vời của bạn!</p>
            </div>

            <form method="POST" action="" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="django-form-custom mb-4">
                    {{ form.as_p }}
                </div>

                <div class="mt-5 pt-4 border-top d-flex justify-content-between align-items-center">
                    <a href="/blog/{{ post.id }}/" class="btn btn-outline-primary rounded-pill px-4 fw-medium shadow-sm">
                        <i class="fa-solid fa-arrow-left me-2"></i> Hủy bỏ
                    </a>
                    
                    <button type="submit" class="btn btn-outline-primary rounded-pill px-5 fw-bold shadow-sm" style="font-size: 16px;">
                        <i class="fa-solid fa-floppy-disk me-2"></i> Lưu Thay Đổi
                    </button>
                </div>
            </form>
            
        </div>
    </div>
</div>

<style>
    .django-form-custom label { font-weight: 600; color: #495057; margin-bottom: 8px; margin-top: 15px; display: block; font-size: 15px; }
    .django-form-custom input[type="text"], .django-form-custom input[type="file"], .django-form-custom textarea { width: 100%; padding: 12px 15px; border: 1px solid #dee2e6; border-radius: 8px; background-color: #f8f9fa; color: #212529; transition: all 0.3s ease; }
    .django-form-custom textarea { min-height: 200px; resize: vertical; }
    .django-form-custom input:focus, .django-form-custom textarea:focus { border-color: #ffc107; background-color: #ffffff; outline: none; box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.15); }
    .django-form-custom span.helptext { font-size: 13px; color: #6c757d; display: block; margin-top: 6px; }
    .django-form-custom a { color: #0d6efd; text-decoration: none; }
</style>
{% endblock %}
